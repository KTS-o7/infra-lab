id: apigateway-http-trigger
order: 7
module: api
submodule: expose-http-entrypoint
mission_type: lesson
required: true
title: Give the Function an HTTP Address
summary: Wire a Lambda function to an API Gateway HTTP endpoint so external clients can call Orbiton's backend without invoking Lambda directly.
difficulty: beginner
services:
  - apigateway
  - lambda
xp: 200
estimated_minutes: 25
prerequisites:
  - lambda-tiny-function
story: |
  Orbiton's mobile app team is waiting on a backend endpoint. Priya writes up the
  task: "We need GET /hello reachable over HTTP so the app team can start
  integration testing. Deploy a function, create an API Gateway API, add the
  route, wire the Lambda, and give me a curl that returns 200. Mobile standup
  is in two hours. They're blocked."
learning_objectives:
  - Understand API Gateway HTTP APIs
  - Create and configure routes
  - Integrate Lambda with HTTP endpoints
  - Test HTTP endpoints locally
capability: http_api
motivation: |
  The mobile app team cannot call a Lambda function directly — they need an HTTP
  address. API Gateway is the managed layer that receives requests, matches routes,
  and invokes your function. Without it, external clients have no stable URL to hit.
theory: |
  API Gateway receives HTTP requests and matches them to routes. Each route points
  to an integration — in this case, a Lambda function. The gateway invokes the
  function and returns its response to the caller.
thought_process: |
  Build inside-out: deploy the function first, then create the API, add the route,
  wire the integration, and finally test the full HTTP path. Debugging is much
  easier when each layer is proven before the next one is added.
debrief: |
  The mobile team has a working endpoint. GET /hello is live at a stable URL and
  invokes the Lambda function on every request. This API Gateway + Lambda pattern
  is the backbone of Orbiton's entire serverless backend.
commands:
  - id: create-function
    label: Create Lambda function
    command: cd missions/apigateway-http-trigger/function && zip -r function.zip index.mjs && aws --endpoint-url http://localhost:4566 lambda create-function --function-name starter-api-function --runtime nodejs22.x --handler index.handler --zip-file fileb://function.zip --role arn:aws:iam::000000000000:role/local-lambda-role
  - id: create-api
    label: Create API Gateway API
    command: aws --endpoint-url http://localhost:4566 apigatewayv2 create-api --name starter-api --protocol-type HTTP
  - id: add-route
    label: Add route
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`starter-api`].ApiId' --output text) && aws --endpoint-url http://localhost:4566 apigatewayv2 create-route --api-id "$API_ID" --route-key "GET /hello"
  - id: integrate
    label: Integrate Lambda
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`starter-api`].ApiId' --output text) && ROUTE_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-routes --api-id "$API_ID" --query 'Items[?RouteKey==`GET /hello`].RouteId' --output text) && INTEGRATION_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 create-integration --api-id "$API_ID" --integration-type LAMBDA_PROXY --integration-uri arn:aws:lambda:us-east-1:000000000000:function:starter-api-function --payload-format 1.0 --query IntegrationId --output text) && aws --endpoint-url http://localhost:4566 apigatewayv2 update-route --api-id "$API_ID" --route-id "$ROUTE_ID" --target "integrations/$INTEGRATION_ID"
  - id: invoke
    label: Call HTTP endpoint
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`starter-api`].ApiId' --output text) && curl "http://localhost:4566/restapis/$API_ID/default/_user_request_/hello"
steps:
  - id: deploy-api-function
    title: Deploy the function
    goal: Deploy a Lambda function that will handle HTTP requests.
    why: Lambda functions are the compute layer behind API Gateway. When an HTTP request arrives, API Gateway invokes your function to generate the response.
    target_state:
      - label: Function
        value: starter-api-function
      - label: Runtime
        value: nodejs22.x
    action: Package and deploy the function to the local Lambda runtime.
    command_id: create-function
    check_ids:
      - function-exists
    success: The starter-api-function is deployed.
  - id: create-http-api
    title: Create the HTTP API
    goal: Create an API Gateway HTTP API named starter-api.
    why: API Gateway is the public entrypoint for serverless workloads. It receives HTTP requests and routes them to your compute layer (Lambda).
    target_state:
      - label: API
        value: starter-api
      - label: Protocol
        value: HTTP
    action: Create the HTTP API in your local API Gateway.
    command_id: create-api
    check_ids:
      - api-exists
    success: The starter-api HTTP API exists.
  - id: add-hello-route
    title: Add the route
    goal: Add a GET /hello route to the API.
    why: Routes define the URL paths and HTTP methods your API accepts. Each route is a separate entrypoint.
    target_state:
      - label: Route
        value: GET /hello
      - label: API
        value: starter-api
    action: Create the GET /hello route in API Gateway.
    command_id: add-route
    check_ids:
      - route-exists
    success: The GET /hello route exists.
  - id: wire-lambda-integration
    title: Wire the Lambda integration
    goal: Connect the GET /hello route to the starter-api-function Lambda.
    why: Integration is what makes the route actually invoke your function. Without it, the route exists but does nothing.
    target_state:
      - label: Integration
        value: starter-api-function
      - label: Route
        value: GET /hello
    action: Integrate the route with the Lambda function.
    command_id: integrate
    check_ids:
      - integrated-route
    success: The route is wired to the Lambda.
  - id: call-and-verify
    title: Call the HTTP endpoint
    goal: Call the GET /hello endpoint and confirm it returns the expected response.
    why: Testing the full HTTP path confirms the integration works end-to-end. API Gateway receives the request, invokes Lambda, and returns the function's response.
    target_state:
      - label: Endpoint
        value: http://localhost:4566/restapis/{apiId}/default/_user_request_/hello
      - label: Status
        value: "200"
      - label: Response
        value: '{"message":"Hello from local API"}'
    action: Send an HTTP GET to the /hello endpoint and verify the response.
    command_id: invoke
    check_ids:
      - http-response
    success: The endpoint returned the expected JSON response.
hints:
  - id: route-key
    title: Route key
    level: nudge
    applies_to_checks:
      - route-exists
    text: The route key is "GET /hello". API Gateway routes requests based on the path and method.
    penalty_xp: 5
  - id: endpoint
    title: Local endpoint
    level: diagnosis
    applies_to_checks:
      - function-exists
      - http-response
    text: Use --endpoint-url http://localhost:4566 for all CLI commands in this lab.
    penalty_xp: 5
  - id: rewire-route
    title: Rewire the route
    level: repair
    applies_to_checks:
      - route-exists
      - http-response
    text: If the route exists but the HTTP check fails, re-run the integration command so GET /hello targets starter-api-function.
    penalty_xp: 10
checks:
  - id: function-exists
    type: lambda_function_exists
    function_name: starter-api-function
  - id: api-exists
    type: apigateway_api_exists
    api_name: starter-api
  - id: route-exists
    type: apigateway_route_exists
    api_name: starter-api
    route: GET /hello
  - id: integrated-route
    type: apigateway_route_exists
    api_name: starter-api
    route: GET /hello
    target_prefix: integrations/
  - id: http-response
    type: apigateway_http_returns
    api_name: starter-api
    route: GET /hello
    expected_status: 200
    expected_json:
      message: Hello from local API
owned_resources:
  - type: apigateway_api
    api_name: starter-api
  - type: lambda_function
    function_name: starter-api-function
