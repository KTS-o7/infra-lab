id: launchdesk-compose-capstone
order: 8
module: composition
submodule: compose-launchdesk-workflow
mission_type: module_capstone
required: false
title: Ship the Order Flow End-to-End
summary: Build a complete order processing pipeline — API Gateway receives the order, Lambda stores it in DynamoDB and queues a notification via SQS.
difficulty: boss
services:
  - apigateway
  - lambda
  - dynamodb
  - sqs
xp: 300
estimated_minutes: 35
prerequisites:
  - sns-fanout
story: |
  Priya walks you to the whiteboard. "Big week. We signed three enterprise customers
  and they want order tracking live before the end of the month. Here's what we
  need: POST /orders hits API Gateway, a Lambda function writes the order to
  DynamoDB and queues a notification in SQS. We already have the pieces — you've
  built each one separately. Now compose them into one working flow. Send a test
  order and prove both the database write and the queue notification happen.
  No partial credit — all four services need to be wired and verified."
learning_objectives:
  - Build complete serverless workflows
  - Integrate multiple AWS services
  - Process orders and send notifications
capability: composed_platform
motivation: |
  Enterprise customers need order tracking. That means a real API receiving orders,
  durable storage so orders are never lost, and async notifications so downstream
  systems (billing, fulfillment, analytics) can react without blocking the API.
  All four services need to cooperate as one flow.
theory: |
  Production SaaS platforms compose specialized services. The API is the entrypoint.
  Lambda runs the business logic. DynamoDB stores the durable state. SQS carries the
  downstream notification. Each service does one thing well; composition is what
  makes them useful together.
thought_process: |
  Start with the inner dependencies — create the DynamoDB table and SQS queue first,
  then deploy the Lambda, then wire API Gateway last. This way every layer depends
  on something already proven. Test the end-to-end by sending one known order and
  checking both the database and the queue.
debrief: |
  The order flow is live. POST /orders is wired end-to-end: the API receives the
  request, Lambda processes it, DynamoDB stores the record, and SQS delivers the
  notification. Orbiton's enterprise customers have what they need. Priya approves
  the architecture for production.
commands:
  - id: create-dynamodb-table
    label: Create DynamoDB table
    command: aws --endpoint-url http://localhost:4566 dynamodb create-table --table-name orders-table --attribute-definitions AttributeName=pk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH --billing-mode PAY_PER_REQUEST
  - id: create-sqs-queue
    label: Create SQS queue
    command: aws --endpoint-url http://localhost:4566 sqs create-queue --queue-name orders-queue --attributes VisibilityTimeout=0
  - id: create-lambda
    label: Create Lambda function
    command: cd missions/launchdesk-compose-capstone/function && zip -r function.zip index.py && aws --endpoint-url http://localhost:4566 lambda create-function --function-name orders-function --runtime python3.12 --handler index.handler --zip-file fileb://function.zip --role arn:aws:iam::000000000000:role/local-lambda-role --environment Variables={AWS_ENDPOINT_URL=http://floci:4566,AWS_ACCESS_KEY_ID=test,AWS_SECRET_ACCESS_KEY=test,AWS_DEFAULT_REGION=us-east-1}
  - id: create-api
    label: Create API Gateway API
    command: aws --endpoint-url http://localhost:4566 apigatewayv2 create-api --name orders-api --protocol-type HTTP
  - id: integrate
    label: Integrate Lambda
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`orders-api`].ApiId' --output text) && ROUTE_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-routes --api-id "$API_ID" --query 'Items[?RouteKey==`POST /orders`].RouteId' --output text) && INTEGRATION_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 create-integration --api-id "$API_ID" --integration-type LAMBDA_PROXY --integration-uri arn:aws:lambda:us-east-1:000000000000:function:orders-function --payload-format 1.0 --query IntegrationId --output text) && aws --endpoint-url http://localhost:4566 apigatewayv2 update-route --api-id "$API_ID" --route-id "$ROUTE_ID" --target "integrations/$INTEGRATION_ID"
  - id: test-endpoint
    label: Test the endpoint
    command: "API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`orders-api`].ApiId' --output text) && curl -X POST \"http://localhost:4566/restapis/$API_ID/default/_user_request_/orders\" -H \"Content-Type: application/json\" -d '{\"orderId\":\"order-001\",\"item\":\"notebook\"}'"
steps:
  - id: create-orders-table
    title: Create the orders table
    goal: Create a DynamoDB table named orders-table to store incoming orders.
    why: Durable state is the backbone of any platform. Orders need to be stored reliably before they are processed.
    target_state:
      - label: Runtime
        value: local Floci endpoint reachable
      - label: Table
        value: orders-table
      - label: Partition key
        value: pk (String)
    action: Create the orders-table in DynamoDB with pk as the partition key.
    command_id: create-dynamodb-table
    check_ids:
      - floci-available
      - table-exists
    success: The orders-table exists.
  - id: create-orders-queue
    title: Create the orders queue
    goal: Create an SQS queue named orders-queue for order notification delivery.
    why: The queue receives notifications when orders are placed. Downstream workers can consume these messages independently of the API.
    target_state:
      - label: Queue
        value: orders-queue
      - label: Visibility
        value: "0 (fire-and-forget)"
    action: Create the orders-queue in SQS.
    command_id: create-sqs-queue
    check_ids:
      - queue-exists
    success: The orders-queue exists.
  - id: deploy-orders-function
    title: Deploy the order processor
    goal: Deploy the orders-function Lambda that processes incoming orders.
    why: The Lambda is the brains of the system. It receives HTTP requests, persists order data to DynamoDB, and notifies downstream workers via SQS.
    target_state:
      - label: Function
        value: orders-function
      - label: Runtime
        value: python3.12
      - label: Handler
        value: index.handler
    action: Package and deploy the orders-function.
    command_id: create-lambda
    check_ids:
      - function-exists
    success: The orders-function is deployed.
  - id: create-orders-api
    title: Create the API
    goal: Create an HTTP API named orders-api to receive order submissions.
    why: The API is the public entrypoint. It receives JSON payloads and passes them to the Lambda function.
    target_state:
      - label: API
        value: orders-api
      - label: Protocol
        value: HTTP
    action: Create the orders-api in API Gateway.
    command_id: create-api
    check_ids:
      - orders-api-exists
    success: The orders-api exists.
  - id: add-orders-route
    title: Add the orders route
    goal: Add a POST /orders route to receive order submissions.
    why: The route defines the URL path for order creation. POST indicates the endpoint accepts new data.
    target_state:
      - label: Route
        value: POST /orders
      - label: API
        value: orders-api
    action: Create the POST /orders route.
    check_ids:
      - api-route
    success: The POST /orders route exists.
    notes: Capstone step. Use the API ID for orders-api and create a POST /orders route before wiring the integration.
  - id: wire-orders-integration
    title: Wire the Lambda integration
    goal: Connect the POST /orders route to the orders-function Lambda.
    why: Integration is what makes the route functional. Without it, the route is defined but cannot execute the processor.
    target_state:
      - label: Integration
        value: orders-function
      - label: Route
        value: POST /orders
    action: Integrate the route with the Lambda function.
    command_id: integrate
    check_ids:
      - integrated-route
    success: The route is wired to the Lambda.
  - id: test-end-to-end
    title: Test the full flow
    goal: Submit an order via HTTP and verify it is written to DynamoDB and a notification is sent to SQS.
    why: End-to-end testing proves the entire system works as designed. The API receives the order, Lambda processes it and writes to DynamoDB, and a notification message is placed in the SQS queue.
    target_state:
      - label: Endpoint
        value: POST /orders
      - label: Request
        value: "{orderId: order-001, item: notebook}"
      - label: DynamoDB
        value: order#order-001 written
      - label: SQS
        value: notification sent
    action: Submit the test order and verify both the DynamoDB write and SQS notification.
    command_id: test-endpoint
    check_ids:
      - http-writes-item
      - http-sends-message
    success: "The order was processed end-to-end: written to DynamoDB and a notification was sent to SQS."
hints:
  - id: workflow-order
    title: Workflow order
    level: nudge
    applies_to_checks:
      - table-exists
      - queue-exists
      - function-exists
    text: Create DynamoDB table first, then SQS queue, then Lambda, then API Gateway.
    penalty_xp: 10
  - id: lambda-code
    title: Lambda integration
    level: diagnosis
    applies_to_checks:
      - http-writes-item
      - http-sends-message
    text: The Lambda function needs to be integrated with API Gateway to receive HTTP requests.
    penalty_xp: 10
  - id: replay-order
    title: Replay the order
    level: repair
    applies_to_checks:
      - api-route
      - http-writes-item
      - http-sends-message
    text: If the resources exist but end-to-end proof fails, re-run the integration command and submit the order-001 request again.
    penalty_xp: 15
checks:
  - id: floci-available
    type: runtime_floci_available
  - id: orders-api-exists
    type: apigateway_api_exists
    api_name: orders-api
  - id: api-route
    type: apigateway_route_exists
    api_name: orders-api
    route: POST /orders
  - id: integrated-route
    type: apigateway_route_exists
    api_name: orders-api
    route: POST /orders
    target_prefix: integrations/
  - id: function-exists
    type: lambda_function_exists
    function_name: orders-function
  - id: table-exists
    type: dynamodb_table_exists
    table_name: orders-table
  - id: queue-exists
    type: sqs_queue_exists
    queue_name: orders-queue
  - id: http-writes-item
    type: workflow_http_writes_dynamodb
    api_name: orders-api
    route: POST /orders
    request_json:
      orderId: order-001
      item: notebook
    table_name: orders-table
    key:
      pk:
        S: order#order-001
  - id: http-sends-message
    type: workflow_http_sends_sqs
    api_name: orders-api
    route: POST /orders
    request_json:
      orderId: order-001
      item: notebook
    queue_name: orders-queue
    expected_body_contains: order-001
owned_resources:
  - type: apigateway_api
    api_name: orders-api
  - type: lambda_function
    function_name: orders-function
  - type: dynamodb_table
    table_name: orders-table
  - type: sqs_queue
    queue_name: orders-queue
