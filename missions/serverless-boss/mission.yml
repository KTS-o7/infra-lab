id: serverless-boss
order: 8
title: Serverless Boss Mission
summary: Build a complete local serverless workflow with API Gateway, Lambda, DynamoDB, and SQS.
difficulty: boss
services:
  - apigateway
  - lambda
  - dynamodb
  - sqs
xp: 300
estimated_minutes: 35
prerequisites:
  - apigateway-http-trigger
story: |
  You are building a complete local serverless order processing system.
  An HTTP POST to your API creates an order.
  Your Lambda function writes the order to DynamoDB and sends a message to SQS.
  This combines everything you've learned: API Gateway, Lambda, DynamoDB, and SQS.
learning_objectives:
  - Build complete serverless workflows
  - Integrate multiple AWS services
  - Process orders and send notifications
commands:
  - id: create-dynamodb-table
    label: Create DynamoDB table
    command: aws --endpoint-url http://localhost:4566 dynamodb create-table --table-name orders-table --attribute-definitions AttributeName=pk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH --billing-mode PAY_PER_REQUEST
  - id: create-sqs-queue
    label: Create SQS queue
    command: aws --endpoint-url http://localhost:4566 sqs create-queue --queue-name orders-queue --attributes VisibilityTimeout=0
  - id: create-lambda
    label: Create Lambda function
    command: cd missions/serverless-boss/function && zip -r function.zip index.mjs && aws --endpoint-url http://localhost:4566 lambda create-function --function-name orders-function --runtime nodejs22.x --handler index.handler --zip-file fileb://function.zip --role arn:aws:iam::000000000000:role/local-lambda-role
  - id: create-api
    label: Create API Gateway API
    command: aws --endpoint-url http://localhost:4566 apigatewayv2 create-api --name orders-api --protocol-type HTTP
  - id: add-route
    label: Add POST route
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`orders-api`].ApiId' --output text) && aws --endpoint-url http://localhost:4566 apigatewayv2 create-route --api-id "$API_ID" --route-key "POST /orders"
  - id: integrate
    label: Integrate Lambda
    command: API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==`orders-api`].ApiId' --output text) && INTEGRATION_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 create-integration --api-id "$API_ID" --integration-type LAMBDA_PROXY --integration-uri arn:aws:lambda:us-east-1:000000000000:function:orders-function --payload-format 1.0 --query IntegrationId --output text) && aws --endpoint-url http://localhost:4566 apigatewayv2 create-route --api-id "$API_ID" --route-key "POST /orders" --target "$INTEGRATION_ID"
  - id: test-endpoint
    label: Test the endpoint
    command: "API_ID=$(aws --endpoint-url http://localhost:4566 apigatewayv2 get-apis --query 'Items[?Name==orders-api].ApiId' --output text) && curl -X POST http://localhost:4566/$API_ID/orders -H Content-Type:application/json -d orderId=order-001 -d item=notebook"
hints:
  - id: workflow-order
    title: Workflow order
    text: Create DynamoDB table first, then SQS queue, then Lambda, then API Gateway.
    penalty_xp: 10
  - id: lambda-code
    title: Lambda integration
    text: The Lambda function needs to be integrated with API Gateway to receive HTTP requests.
    penalty_xp: 10
checks:
  - id: api-route
    type: apigateway_route_exists
    api_name: orders-api
    route: POST /orders
  - id: function-exists
    type: lambda_function_exists
    function_name: orders-function
  - id: table-exists
    type: dynamodb_table_exists
    table_name: orders-table
  - id: queue-exists
    type: sqs_queue_exists
    queue_name: orders-queue
  - id: http-writes-item
    type: workflow_http_writes_dynamodb
    api_name: orders-api
    route: POST /orders
    request_json:
      orderId: order-001
      item: notebook
    table_name: orders-table
    key:
      pk:
        S: order#order-001
  - id: http-sends-message
    type: workflow_http_sends_sqs
    api_name: orders-api
    route: POST /orders
    request_json:
      orderId: order-001
      item: notebook
    queue_name: orders-queue
    expected_body_contains: order-001
owned_resources:
  - type: apigateway_api
    api_name: orders-api
  - type: lambda_function
    function_name: orders-function
  - type: dynamodb_table
    table_name: orders-table
  - type: sqs_queue
    queue_name: orders-queue