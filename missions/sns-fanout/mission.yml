id: sns-fanout
order: 4
title: Publish and Subscribe
summary: Create an SNS topic and fan out messages to SQS queues.
difficulty: beginner
services:
  - sns
  - sqs
xp: 150
estimated_minutes: 15
prerequisites:
  - sqs-first-message
story: |
  You want to publish one message and have it delivered to multiple systems.
  In AWS, this is done with SNS (Simple Notification Service) for pub/sub.
  A topic receives messages and fans them out to subscribed endpoints.
learning_objectives:
  - Understand SNS topic and subscription model
  - Create topics and queues
  - Configure fanout delivery
commands:
  - id: create-topic
    label: Create SNS topic
    command: aws --endpoint-url http://floci:4566 sns create-topic --name starter-topic
  - id: create-queue
    label: Create SQS queue
    command: aws --endpoint-url http://floci:4566 sqs create-queue --queue-name starter-fanout-queue --attributes VisibilityTimeout=0
  - id: subscribe
    label: Subscribe queue to topic
    command: TOPIC_ARN=$(aws --endpoint-url http://floci:4566 sns list-topics --query 'Topics[?contains(TopicArn,`starter-topic`)].TopicArn' --output text) && QUEUE_ARN=$(aws --endpoint-url http://floci:4566 sqs get-queue-arn --queue-name starter-fanout-queue --query QueueArn --output text) && aws --endpoint-url http://floci:4566 sns subscribe --topic-arn "$TOPIC_ARN" --protocol sqs --notification-endpoint "$QUEUE_ARN"
  - id: publish
    label: Publish message
    command: TOPIC_ARN=$(aws --endpoint-url http://floci:4566 sns list-topics --query 'Topics[?contains(TopicArn,`starter-topic`)].TopicArn' --output text) && aws --endpoint-url http://floci:4566 sns publish --topic-arn "$TOPIC_ARN" --message "local fanout works"
steps:
  - id: create-notification-channel
    title: Create the notification channel
    goal: An SNS topic named starter-topic exists to receive and distribute messages
    why: |
      SNS topics act as pub/sub channels. When something publishes a message to the topic,
      SNS handles delivering copies to every subscribed endpoint without the publisher
      needing to know who is listening.
    target_state:
      - label: SNS topic
        value: starter-topic exists
    action: Create an SNS topic named starter-topic. This is the central hub that receives
      messages and fans them out to subscribers.
    command_id: create-topic
    check_ids:
      - topic-exists
    success: A notification channel is ready to receive and distribute messages.
  - id: create-subscriber-endpoint
    title: Create the subscriber endpoint
    goal: An SQS queue named starter-fanout-queue exists to receive copies of topic messages
    why: |
      SQS queues are subscriber endpoints that buffer and provide durable access to messages.
      By subscribing a queue to a topic, every message published to the topic gets a copy
      delivered to the queue automatically.
    target_state:
      - label: SQS queue
        value: starter-fanout-queue exists
    action: Create an SQS queue named starter-fanout-queue. This queue receives copies of
      messages published to the topic.
    command_id: create-queue
    check_ids:
      - queue-exists
    success: A subscriber endpoint is ready to receive notifications from the topic.
  - id: wire-the-subscription
    title: Wire the subscription
    goal: The queue is subscribed to the topic so messages flow from topic to queue
    why: |
      The subscription is what connects the topic to the queue. Without it, SNS has no
      instructions for where to deliver messages. The subscription tells SNS to deliver
      copies of every message published to the topic to the specified queue.
    target_state:
      - label: SNS subscription
        value: starter-fanout-queue subscribed to starter-topic
    action: Subscribe the starter-fanout-queue to the starter-topic so messages published
      to the topic are delivered to the queue.
    command_id: subscribe
    check_ids:
      - subscription-exists
    success: The subscription is active, routing messages from topic to queue.
  - id: publish-and-verify-fanout
    title: Publish and verify fanout
    goal: A message published to the topic is delivered to the queue, proving fanout works
    why: |
      Publishing a message and confirming its delivery verifies the entire pipeline is working.
      This is the moment you know that one event reaching the topic will notify all
      subscribed consumers without the publisher needing to manage delivery logic.
    target_state:
      - label: Published message
        value: "'local fanout works' sent to starter-topic"
      - label: Delivered message
        value: same message received by starter-fanout-queue
    action: Publish a message to the starter-topic and confirm it reaches the starter-fanout-queue.
    command_id: publish
    check_ids:
      - fanout-message
    success: The fanout pipeline is verified—one message, multiple destinations.
hints:
  - id: topic-name
    title: Topic naming
    text: The topic name is starter-topic. SNS topics work differently than S3 buckets.
    penalty_xp: 5
  - id: endpoint
    title: Local endpoint
    text: Use --endpoint-url http://floci:4566 for all AWS CLI commands in this lab.
    penalty_xp: 5
checks:
  - id: topic-exists
    type: sns_topic_exists
    topic_name: starter-topic
  - id: queue-exists
    type: sqs_queue_exists
    queue_name: starter-fanout-queue
  - id: subscription-exists
    type: sns_subscription_exists
    topic_name: starter-topic
    queue_name: starter-fanout-queue
  - id: fanout-message
    type: sns_to_sqs_delivery
    topic_name: starter-topic
    queue_name: starter-fanout-queue
    body: local fanout works
owned_resources:
  - type: sns_topic
    topic_name: starter-topic
  - type: sqs_queue
    queue_name: starter-fanout-queue