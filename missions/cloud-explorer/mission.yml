id: cloud-explorer
order: 1
module: orientation
submodule: prove-local-sandbox
mission_type: lesson
required: true
title: First Day, First Task
summary: Verify your local lab is running and confirm you are not connected to the real Orbiton AWS account.
difficulty: beginner
services:
  - local
xp: 50
estimated_minutes: 5
prerequisites: []
story: |
  Priya drops a message in Slack on your first morning: "Before you touch anything,
  prove your lab is isolated. Last month someone ran a practice script against
  prod S3 and it cost us $400. Check that every AWS call stays inside Floci —
  our local sandbox — and not the real account. Show me the identity proof."
learning_objectives:
  - Understand that this lab uses local infrastructure
  - Verify Floci is running
  - Learn the local endpoint URL
  - Understand fake AWS credentials
capability: safe_local_sandbox
motivation: |
  Orbiton runs real workloads on AWS. A careless CLI command pointed at the wrong
  endpoint can overwrite production data or run up a bill. Your local Floci sandbox
  exists so you can practice freely — but only if you can prove calls stay inside it.
theory: |
  A local AWS-compatible endpoint accepts AWS CLI calls without contacting AWS servers.
  When you point the CLI at http://localhost:4566 with fake credentials, every call
  goes to Floci and never leaves your machine.
thought_process: |
  Before creating any resource, prove where your commands are going. Get an identity
  response from the local endpoint, then list S3 buckets to confirm the namespace is
  empty — giving you a clean, known baseline before any real work starts.
debrief: |
  Every infrastructure engineer working near production should be able to answer
  "which account am I in?" in under 10 seconds. You now have that habit. The local
  sandbox boundary is locked in — everything you build from here stays safe.
commands:
  - id: check-floci
    label: Check Floci health
    command: aws --endpoint-url http://localhost:4566 sts get-caller-identity
  - id: list-buckets
    label: List S3 buckets
    command: aws --endpoint-url http://localhost:4566 s3 ls
steps:
  - id: confirm-sandbox
    title: Confirm the sandbox boundary
    goal: Verify that AWS-style calls go to the local Floci endpoint.
    why: Production cloud accounts are risky places to learn. This lab keeps practice isolated by routing all AWS-style traffic to a local endpoint.
    target_state:
      - label: Endpoint
        value: http://localhost:4566
      - label: Credentials
        value: fake local credentials
    action: Ask the local endpoint who you are. The response proves the CLI is speaking to the sandbox.
    command_id: check-floci
    check_ids:
      - floci-available
    success: Floci is reachable and the lab boundary is active.
  - id: inspect-empty-storage
    title: Inspect local storage
    goal: Look at the local S3 namespace before creating resources.
    why: Operators inspect current state before changing it. A clean sandbox gives you a predictable starting point.
    target_state:
      - label: Service
        value: S3
      - label: Expected state
        value: no required buckets yet
    action: List local S3 buckets so you can see the sandbox state before future missions add resources.
    command_id: list-buckets
    check_ids:
      - floci-available
    success: The local S3 API is reachable.
hints:
  - id: local-only
    title: Local only lab
    level: nudge
    applies_to_checks:
      - floci-available
    text: This lab does not use real AWS. All commands point to http://localhost:4566.
    penalty_xp: 5
  - id: fake-creds
    title: Fake credentials
    level: diagnosis
    applies_to_checks:
      - floci-available
    text: The AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are both set to "test". This is normal for local development.
    penalty_xp: 5
  - id: restart-runtime
    title: Restart the runtime
    level: repair
    applies_to_checks:
      - floci-available
    text: If the local endpoint is unreachable, run docker compose up --build and wait for Floci before retrying the check.
    penalty_xp: 10
checks:
  - id: floci-available
    type: runtime_floci_available
owned_resources:
  - type: none
    reason: orientation mission has no owned resources
