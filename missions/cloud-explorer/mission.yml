id: cloud-explorer
order: 1
title: Cloud Explorer
summary: Explore the local AWS lab environment and verify everything is working.
difficulty: beginner
services:
  - local
xp: 50
estimated_minutes: 5
prerequisites: []
story: |
  Welcome to Infra Quest! This lab runs entirely on your local machine using Floci,
  a local AWS emulator. No real AWS account needed. No credit card required.
  Let's make sure your environment is ready.
learning_objectives:
  - Understand that this lab uses local infrastructure
  - Verify Floci is running
  - Learn the local endpoint URL
  - Understand fake AWS credentials
commands:
  - id: check-floci
    label: Check Floci health
    command: aws --endpoint-url http://localhost:4566 sts get-caller-identity
  - id: list-buckets
    label: List S3 buckets
    command: aws --endpoint-url http://localhost:4566 s3 ls
hints:
  - id: local-only
    title: Local only lab
    text: This lab does not use real AWS. All commands point to http://localhost:4566.
    penalty_xp: 5
  - id: fake-creds
    title: Fake credentials
    text: The AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are both set to "test". This is normal for local development.
    penalty_xp: 5
checks:
  - id: floci-available
    type: runtime_floci_available
owned_resources:
  - type: none
    reason: orientation mission has no owned resources