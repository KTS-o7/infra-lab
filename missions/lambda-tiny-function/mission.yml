id: lambda-tiny-function
order: 6
module: api
submodule: run-serverless-code
mission_type: lesson
required: true
title: Run Logic Without a Server
summary: Deploy a Lambda function that Orbiton can invoke on demand without provisioning or managing a long-running server.
difficulty: beginner
services:
  - lambda
xp: 175
estimated_minutes: 20
prerequisites:
  - dynamodb-first-table
story: |
  Priya opens the architecture doc and marks a section in yellow: "We have a
  report-generation job that currently runs inside the main API process. It
  blocks the event loop for 5 seconds on every run. I want to pull it out into
  a standalone function we can invoke on demand. Deploy a Lambda called
  starter-function, invoke it with a test payload, and show me it returns a
  clean response. Once I see it work, I'll hand you the report logic to port."
learning_objectives:
  - Understand Lambda function basics
  - Deploy functions locally
  - Invoke and test functions
capability: http_api
motivation: |
  The report job is blocking Orbiton's main API event loop for 5 seconds per
  run. Lambda lets you extract that logic into a function that runs isolated,
  scales independently, and never competes with request handling — without
  provisioning or managing a separate server.
theory: |
  A Lambda function bundles code with a runtime and a handler entrypoint.
  Invocations send an event JSON to the handler and get a response back.
  Lambda manages the execution environment, cold start, and scaling.
thought_process: |
  Prove the function works in isolation before wiring it to an API or queue.
  Package the code, deploy the function, invoke it with a known payload, and
  verify the response. Debugging is much easier when there is only one moving part.
debrief: |
  The report job is extracted and invokable on demand. Priya can now port the
  real report logic into this function and wire it to a queue trigger. Lambda
  is also the compute layer behind Orbiton's upcoming HTTP API.
commands:
  - id: create-function
    label: Create Lambda function
    command: cd missions/lambda-tiny-function/function && zip -r function.zip index.mjs && aws --endpoint-url http://localhost:4566 lambda create-function --function-name starter-function --runtime nodejs22.x --handler index.handler --zip-file fileb://function.zip --role arn:aws:iam::000000000000:role/local-lambda-role
  - id: invoke-function
    label: Invoke function
    command: aws --endpoint-url http://localhost:4566 lambda invoke --function-name starter-function --payload '{"name":"Local Learner"}' /tmp/response.json && cat /tmp/response.json
hints:
  - id: handler-syntax
    title: Handler syntax
    level: nudge
    applies_to_checks:
      - function-exists
    text: The handler is "index.handler" meaning the exported handler function in index.mjs.
    penalty_xp: 5
  - id: endpoint
    title: Local endpoint
    level: diagnosis
    applies_to_checks:
      - function-exists
      - invoke-result
    text: Use --endpoint-url http://localhost:4566 for all Lambda CLI commands in this lab.
    penalty_xp: 5
  - id: redeploy-function
    title: Redeploy the function
    level: repair
    applies_to_checks:
      - function-exists
      - invoke-result
    text: If invocation fails, rebuild function.zip from the mission function directory and re-run the create function command before invoking again.
    penalty_xp: 10
steps:
  - id: deploy-function
    title: Deploy your first function
    goal: Deploy a Lambda function named starter-function.
    why: Lambda lets you run code without provisioning or managing servers. The function package contains your logic, and Lambda handles execution, scaling, and availability.
    target_state:
      - label: Function
        value: starter-function
      - label: Runtime
        value: nodejs22.x
      - label: Handler
        value: index.handler
    action: Package the function code and deploy it to the local Lambda runtime.
    command_id: create-function
    check_ids:
      - function-exists
    success: The starter-function Lambda is deployed and ready to invoke.
  - id: invoke-and-verify
    title: Invoke the function
    goal: Invoke starter-function with a test payload and confirm the response.
    why: Invoking a function is how you run your code in Lambda. The request/response model lets you integrate functions with APIs, queues, databases, and other event sources.
    target_state:
      - label: Invocation
        value: starter-function invoked
      - label: Response
        value: '{"message":"Hello, Local Learner"}'
    action: Call the function with the test payload and inspect the response.
    command_id: invoke-function
    check_ids:
      - invoke-result
    success: The function returned the expected response.
checks:
  - id: function-exists
    type: lambda_function_exists
    function_name: starter-function
  - id: invoke-result
    type: lambda_invoke_returns
    function_name: starter-function
    payload:
      name: Local Learner
    expected:
      message: Hello, Local Learner
owned_resources:
  - type: lambda_function
    function_name: starter-function
