id: dynamodb-first-table
order: 5
module: database
submodule: persist-application-records
mission_type: lesson
required: true
title: Key-Value Store
summary: Create a DynamoDB table and store an item with a partition key.
difficulty: beginner
services:
  - dynamodb
xp: 150
estimated_minutes: 15
prerequisites:
  - sns-fanout
story: |
  You need to store key-value data that can be retrieved quickly.
  In AWS, this is done with DynamoDB, a managed NoSQL database.
  Tables have partition keys that uniquely identify each item.
learning_objectives:
  - Understand DynamoDB table structure
  - Create tables with partition keys
  - Put and get items
capability: persisted_records
motivation: |
  LaunchDesk needs structured records that survive restarts, such as requests, tenants, or order state. Files alone are not enough for queryable application data.
theory: |
  DynamoDB stores items in tables. A partition key identifies where each item lives and gives the application a stable way to retrieve records.
thought_process: |
  Model the smallest useful record first instead of designing a broad schema too early. Define the table boundary, choose a simple partition key, write one known item, and verify its attributes.
debrief: |
  Durable records are how SaaS platforms remember user actions and workflow state. LaunchDesk now has a place for structured application data.
commands:
  - id: create-table
    label: Create DynamoDB table
    command: aws --endpoint-url http://localhost:4566 dynamodb create-table --table-name starter-table --attribute-definitions AttributeName=pk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH --billing-mode PAY_PER_REQUEST
  - id: put-item
    label: Put item
    command: aws --endpoint-url http://localhost:4566 dynamodb put-item --table-name starter-table --item '{"pk":{"S":"learner#1"},"name":{"S":"Local Learner"},"level":{"N":"1"}}'
  - id: get-item
    label: Get item
    command: aws --endpoint-url http://localhost:4566 dynamodb get-item --table-name starter-table --key '{"pk":{"S":"learner#1"}}'
steps:
  - id: create-table
    title: Create the table
    goal: Create a DynamoDB table named starter-table with a partition key named pk.
    why: DynamoDB tables are the namespace for your data. The partition key determines how data is distributed across storage nodes, and how items are uniquely addressed.
    target_state:
      - label: Table
        value: starter-table
      - label: Partition key
        value: pk (String)
      - label: Billing
        value: PAY_PER_REQUEST
    action: Create the table in your local DynamoDB with pk as the partition key.
    command_id: create-table
    check_ids:
      - table-exists
      - key-schema
    success: The starter-table exists with pk as its partition key.
  - id: store-record
    title: Store a record
    goal: Put an item into starter-table with pk=learner#1, name=Local Learner, and level=1.
    why: Items are the records in DynamoDB. Each item is uniquely identified by its partition key plus any sort key. Writing items is how applications persist state.
    target_state:
      - label: Table
        value: starter-table
      - label: Key
        value: pk = learner#1
      - label: Name
        value: Local Learner
      - label: Level
        value: "1"
    action: Put the item with pk learner#1, name Local Learner, and level 1 into the table.
    command_id: put-item
    check_ids:
      - item-exists
      - item-name
    success: The item with pk learner#1 is stored and has the correct attributes.
  - id: retrieve-record
    title: Retrieve the record
    goal: Get the item by its partition key and confirm it contains the expected data.
    why: Reading items verifies your writes and confirms the data model is correct. DynamoDB's get is an efficient point read by primary key.
    target_state:
      - label: Table
        value: starter-table
      - label: Retrieved key
        value: pk = learner#1
      - label: Retrieved name
        value: Local Learner
    action: Get the item by pk learner#1 and inspect its attributes.
    command_id: get-item
    check_ids:
      - item-exists
    success: The item was retrieved and contains the expected data.
hints:
  - id: partition-key
    title: Partition key
    level: nudge
    applies_to_checks:
      - key-schema
    text: The partition key is named "pk" and stores strings (S). DynamoDB uses this to distribute data.
    penalty_xp: 5
  - id: local-endpoint
    title: Local endpoint
    level: diagnosis
    applies_to_checks:
      - table-exists
      - item-exists
    text: Use --endpoint-url http://localhost:4566 for all DynamoDB CLI commands.
    penalty_xp: 5
  - id: rewrite-item
    title: Rewrite the item
    level: repair
    applies_to_checks:
      - item-exists
      - item-name
    text: If the table exists but the item check fails, re-run the put item command exactly so pk, name, and level match the expected record.
    penalty_xp: 10
checks:
  - id: table-exists
    type: dynamodb_table_exists
    table_name: starter-table
  - id: key-schema
    type: dynamodb_key_schema_equals
    table_name: starter-table
    partition_key:
      name: pk
      type: S
  - id: item-exists
    type: dynamodb_item_exists
    table_name: starter-table
    key:
      pk:
        S: learner#1
  - id: item-name
    type: dynamodb_item_attribute_equals
    table_name: starter-table
    key:
      pk:
        S: learner#1
    attribute: name
    expected:
      S: Local Learner
owned_resources:
  - type: dynamodb_table
    table_name: starter-table
