id: dynamodb-first-table
order: 5
module: database
submodule: persist-application-records
mission_type: lesson
required: true
title: We Need a Real Database
summary: Create a DynamoDB table so Orbiton can store structured application records that survive restarts and support fast lookups.
difficulty: beginner
services:
  - dynamodb
xp: 150
estimated_minutes: 15
prerequisites:
  - sns-fanout
story: |
  Priya pulls up the ticket backlog: "We're storing user records in memory. Every
  time the API pod restarts, we lose the session state and users get logged out.
  On-call got three escalations last night. We need a database. Create a DynamoDB
  table called starter-table, write a user record into it, and read it back.
  If you can prove the data survives, I can start the migration planning."
learning_objectives:
  - Understand DynamoDB table structure
  - Create tables with partition keys
  - Put and get items
capability: persisted_records
motivation: |
  Users are being logged out on every pod restart because session state lives in
  memory. Three on-call escalations in one night is not acceptable. Orbiton needs
  structured records that survive restarts and can be retrieved by primary key in
  single-digit milliseconds.
theory: |
  DynamoDB is a managed NoSQL database. Data is organized in tables. Every item
  has a partition key that uniquely identifies it and controls how data is
  distributed across storage. You write with put-item and read with get-item.
thought_process: |
  Define the simplest useful key model before writing code: what uniquely identifies
  a user record? Create the table with that key, write one known record, then read
  it back. If the attributes match, the data model is correct.
debrief: |
  User records are now durable. The session state loss stops here. Priya can
  begin migrating in-memory data to the table. DynamoDB also handles the
  indexing, replication, and scaling — Orbiton gets that for free.
commands:
  - id: create-table
    label: Create DynamoDB table
    command: aws --endpoint-url http://localhost:4566 dynamodb create-table --table-name starter-table --attribute-definitions AttributeName=pk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH --billing-mode PAY_PER_REQUEST
  - id: put-item
    label: Put item
    command: aws --endpoint-url http://localhost:4566 dynamodb put-item --table-name starter-table --item '{"pk":{"S":"learner#1"},"name":{"S":"Local Learner"},"level":{"N":"1"}}'
  - id: get-item
    label: Get item
    command: aws --endpoint-url http://localhost:4566 dynamodb get-item --table-name starter-table --key '{"pk":{"S":"learner#1"}}'
steps:
  - id: create-table
    title: Create the table
    goal: Create a DynamoDB table named starter-table with a partition key named pk.
    why: DynamoDB tables are the namespace for your data. The partition key determines how data is distributed across storage nodes, and how items are uniquely addressed.
    target_state:
      - label: Table
        value: starter-table
      - label: Partition key
        value: pk (String)
      - label: Billing
        value: PAY_PER_REQUEST
    action: Create the table in your local DynamoDB with pk as the partition key.
    command_id: create-table
    check_ids:
      - table-exists
      - key-schema
    success: The starter-table exists with pk as its partition key.
  - id: store-record
    title: Store a record
    goal: Put an item into starter-table with pk=learner#1, name=Local Learner, and level=1.
    why: Items are the records in DynamoDB. Each item is uniquely identified by its partition key plus any sort key. Writing items is how applications persist state.
    target_state:
      - label: Table
        value: starter-table
      - label: Key
        value: pk = learner#1
      - label: Name
        value: Local Learner
      - label: Level
        value: "1"
    action: Put the item with pk learner#1, name Local Learner, and level 1 into the table.
    command_id: put-item
    check_ids:
      - item-exists
      - item-name
    success: The item with pk learner#1 is stored and has the correct attributes.
  - id: retrieve-record
    title: Retrieve the record
    goal: Get the item by its partition key and confirm it contains the expected data.
    why: Reading items verifies your writes and confirms the data model is correct. DynamoDB's get is an efficient point read by primary key.
    target_state:
      - label: Table
        value: starter-table
      - label: Retrieved key
        value: pk = learner#1
      - label: Retrieved name
        value: Local Learner
    action: Get the item by pk learner#1 and inspect its attributes.
    command_id: get-item
    check_ids:
      - item-exists
    success: The item was retrieved and contains the expected data.
hints:
  - id: partition-key
    title: Partition key
    level: nudge
    applies_to_checks:
      - key-schema
    text: The partition key is named "pk" and stores strings (S). DynamoDB uses this to distribute data.
    penalty_xp: 5
  - id: local-endpoint
    title: Local endpoint
    level: diagnosis
    applies_to_checks:
      - table-exists
      - item-exists
    text: Use --endpoint-url http://localhost:4566 for all DynamoDB CLI commands.
    penalty_xp: 5
  - id: rewrite-item
    title: Rewrite the item
    level: repair
    applies_to_checks:
      - item-exists
      - item-name
    text: If the table exists but the item check fails, re-run the put item command exactly so pk, name, and level match the expected record.
    penalty_xp: 10
checks:
  - id: table-exists
    type: dynamodb_table_exists
    table_name: starter-table
  - id: key-schema
    type: dynamodb_key_schema_equals
    table_name: starter-table
    partition_key:
      name: pk
      type: S
  - id: item-exists
    type: dynamodb_item_exists
    table_name: starter-table
    key:
      pk:
        S: learner#1
  - id: item-name
    type: dynamodb_item_attribute_equals
    table_name: starter-table
    key:
      pk:
        S: learner#1
    attribute: name
    expected:
      S: Local Learner
owned_resources:
  - type: dynamodb_table
    table_name: starter-table
