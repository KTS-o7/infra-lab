id: launchdesk-cloud-apprenticeship
title: Orbiton Infrastructure Bootcamp
summary: "You just joined Orbiton as a backend infrastructure engineer. The product is live, customers are paying, and Priya — your tech lead — has a backlog of cloud tasks with your name on them. Each mission is a real task. Build it, prove it works, and ship it."
modules:
  - id: orientation
    order: 0
    title: Local Cloud Orientation
    required: true
    capability: safe_local_sandbox
    capability_label: Safe local sandbox
    summary: Get your local lab running and prove you are not touching production.
    capstone_mission_id: null
    capstone_required: false
  - id: storage
    order: 1
    title: Store Files Outside The App
    required: true
    capability: durable_file_storage
    capability_label: Durable file storage
    summary: Give the platform a place to keep files that survive container restarts.
    capstone_mission_id: null
    capstone_required: false
  - id: api
    order: 2
    title: Expose A Backend API
    required: true
    capability: http_api
    capability_label: HTTP backend API
    summary: Build a serverless HTTP entrypoint that clients can call.
    capstone_mission_id: null
    capstone_required: false
  - id: database
    order: 3
    title: Persist Application Records
    required: true
    capability: persisted_records
    capability_label: Persisted application records
    summary: Give the platform structured records that survive restarts and support queries.
    capstone_mission_id: null
    capstone_required: false
  - id: async_processing
    order: 4
    title: Move Slow Work Out Of Requests
    required: true
    capability: async_work
    capability_label: Async background work
    summary: Stop blocking user requests on slow work — hand it off to a queue.
    capstone_mission_id: null
    capstone_required: false
  - id: events
    order: 5
    title: Broadcast Platform Events
    required: true
    capability: event_fanout
    capability_label: Platform event fanout
    summary: Let one event reach many consumers without hard-coding every receiver.
    capstone_mission_id: null
    capstone_required: false
  - id: composition
    order: 6
    title: Compose The Platform
    required: true
    capability: composed_platform
    capability_label: Composed end-to-end platform
    summary: Wire storage, compute, database, and queue into one end-to-end flow.
    capstone_mission_id: launchdesk-compose-capstone
    capstone_required: false
  - id: operations
    order: 7
    title: Operate And Debug
    required: true
    capability: operational_debugging
    capability_label: Operational debugging
    summary: Diagnose failures, isolate root cause, and repair without blowing everything up.
    capstone_mission_id: null
    capstone_required: false
