services:
  floci:
    image: floci/floci:1.5.13
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    environment:
      FLOCI_SERVICES_DOCKER_NETWORK: infra-lab_default
    volumes:
      - ./data/floci:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      DATABASE_URL: sqlite:////app/data/lab.db
      MISSIONS_DIR: /app/missions
      AI_AGENT_CMD: ${AI_AGENT_CMD:-}
      AMA_HOST_BRIDGE: ${AMA_HOST_BRIDGE:-}
    volumes:
      - ./data/api:/app/data
      - ./missions:/app/missions:ro
    depends_on:
      floci:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - api
